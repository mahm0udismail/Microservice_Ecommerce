server:
  port: 8090

spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: customer_db

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
